name: portfolio
on:
    push:
        branches: [main]
    workflow_dispatch: 
permissions:
    pages: write
    id-token: write
    contents: read
    
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # Step 1: Check out code from the repo
            - name: Deploy portfolio website to github pages
              uses: actions/checkout@v4
            

            # Step 2: Configure github pages 
            - name: Configure Pages
              uses: actions/configure-pages@v4
            
            # Step 3: Upload the static files

            - name: Deploy artificats (static files)
              uses: actions/upload-artifact@v4
              with:
                path: "."
            # Step 4: Deploy to Github Pages
            - name: Deploy to github pages
              uses: actions/deploy-pages@v4
            
            - name: Get URL
              run: echo "The deployment URL is ${{ steps.deployment.outputs.page_url }}"

            
            




    
